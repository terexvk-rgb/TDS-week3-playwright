name: Playwright QA Sum

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Step with email 23f2002999@ds.study.iitm.ac.in
        run: echo "Running Playwright QA"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install

      - name: Run scraper
        run: python scrape_sum.py

        